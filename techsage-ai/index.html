<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>TechSage AI — Voice AI Companion for Seniors</title>
    <meta name="description" content="TechSage AI helps senior citizens learn technology using voice, AI guidance, and scam detection." />
    <meta name="keywords" content="AI for seniors, scam detection, voice assistant, tech learning, accessibility" />
    <meta name="author" content="TechSage Team" />

    <!-- Theme Color (mobile browser UI) -->
    <meta name="theme-color" content="#1F4E79" />

    <!-- Open Graph (for sharing link preview) -->
    <meta property="og:title" content="TechSage AI" />
    <meta property="og:description" content="A voice-first AI companion helping seniors stay safe and learn technology." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://your-app.vercel.app" />
    <meta property="og:image" content="/preview.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet" />

    <!-- Base Styles -->
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background: #F4F1FA;
        font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
        color: #1A1A1A;
        -webkit-font-smoothing: antialiased;
      }

      /* Improve tap highlight for mobile */
      button {
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>

  <body>
    <!-- Root React App -->
    <div id="root"></div>

    <!-- Main Script -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
